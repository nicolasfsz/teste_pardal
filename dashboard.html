<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Gestão | Produtos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header>
    <div class="logo"><strong>nickin</strong>produtos</div>
    <div class="user-info">
        <a href="movimentacoes.html" class="btn-secondary" style="border:none; border-bottom: 2px solid #000; padding: 5px;">Ir para Movimentações</a>
        <a href="index.html" class="btn-logout" style="margin-left: 15px;">Sair</a>
    </div>
</header>

<main class="main-content">
    <div class="stats-grid">
        <div class="stat-card">
            <small>Total de Produtos</small>
            <h2 id="total-count">0</h2>
        </div>
        <div class="stat-card">
            <small>Valor em Stock</small>
            <h2 id="total-value">R$ 0,00</h2>
        </div>
        <div class="stat-card" style="border-left: 4px solid #000;">
            <small>Alertas de Stock</small>
            <h2 id="alert-count">0</h2>
        </div>
    </div>

    <div class="top-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar produtos...">
        <button class="btn-primary" onclick="abrirModalNovo()">+ Novo Produto</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Stock</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaProdutos">
                </tbody>
        </table>
    </div>
</main>

<div id="modalProduto" class="modal">
    <div class="modal-content form-container">
        <div class="modal-header">
            <h3 id="modalTitle">Novo Produto</h3>
            <p class="subtitle">Preencha os detalhes do item para adicioná-lo ao inventário.</p>
        </div>
        
        <form id="formProduto">
            <input type="hidden" id="produtoId">
            
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Nome do Produto *</label>
                    <input type="text" id="nome" placeholder="Ex: Caderno Universitário" required>
                </div>

                <div class="form-group full-width">
                    <label>Descrição Opcional</label>
                    <textarea id="descricao" rows="3" placeholder="Detalhes técnicos..."></textarea>
                </div>

                <div class="form-group">
                    <label>Preço de Venda (R$) *</label>
                    <input type="number" step="0.01" id="preco" required>
                </div>

                <div class="form-group">
                    <label>Stock Atual *</label>
                    <input type="number" id="estoque" required>
                </div>

                <div class="form-group">
                    <label>Alerta de Stock Mín. *</label>
                    <input type="number" id="estoqueMin" required>
                    <small class="helper-text">Avisa quando chegar neste valor.</small>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button type="submit" class="btn-primary btn-save">Guardar Produto</button>
            </div>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
