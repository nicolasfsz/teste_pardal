<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Movimentações | Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
     
        .alert-box {
            background: var(--bg-surface);
            border: 2px solid var(--border-color);
            padding: 15px;
            margin-bottom: 30px;
            box-shadow: 4px 4px 0px var(--border-color);
        }
        .alert-box strong { text-transform: uppercase; display: block; margin-bottom: 5px; }
        .section-title { margin: 30px 0 15px 0; text-transform: uppercase; font-size: 1.2rem; border-bottom: 2px solid #000; padding-bottom: 5px;}
        .badge-entrada { background: #fff; border: 2px solid #000; padding: 2px 8px; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; }
        .badge-saida { background: #000; color: #fff; border: 2px solid #000; padding: 2px 8px; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>

<header>
    <div class="logo"><strong>nickin</strong>Estoque</div>
    <div class="user-info">
        <a href="dashboard.html" class="btn-secondary" style="border:none; border-bottom: 2px solid #000; padding: 5px;">Voltar aos Produtos</a>
        
    </div>
</header>

<main class="main-content">
    
    <div class="alert-box" id="alertBox" style="display: none;">
        <strong>⚠ Alertas de Estoque:</strong>
        <div id="alertMessages"></div>
    </div>

    <div class="top-bar">
        <h2 class="section-title" style="margin: 0; border: none;">Status Atual (Alfabético)</h2>
        <button class="btn-primary" onclick="abrirModalMovimentacao()">+ Nova Movimentação</button>
    </div>

    <div class="table-container" style="margin-bottom: 40px;">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Qtd Atual</th>
                    <th>Est. Mínimo</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabelaStatus"></tbody>
        </table>
    </div>

    <h2 class="section-title">Histórico de Movimentações</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Produto</th>
                    <th>Tipo</th>
                    <th>Quantidade</th>
                </tr>
            </thead>
            <tbody id="tabelaHistorico"></tbody>
        </table>
    </div>
</main>

<div id="modalMov" class="modal">
    <div class="modal-content form-container">
        <div class="modal-header">
            <h3>Nova Movimentação</h3>
            <p class="subtitle">Registre entradas ou saídas de produtos no inventário.</p>
        </div>
        
        <form id="formMovimentacao">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Produto *</label>
                    <select id="movProduto" required>
                        <option value="">Selecione um produto...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Tipo *</label>
                    <select id="movTipo" required>
                        <option value="Entrada">Entrada</option>
                        <option value="Saida">Saída</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Quantidade *</label>
                    <input type="number" id="movQtd" placeholder="Qtd" min="1" required>
                </div>

                <div class="form-group full-width">
                    <label>Data *</label>
                    <input type="date" id="movData" required>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button type="submit" class="btn-primary btn-save">Registrar Movimentação</button>
            </div>
        </form>
    </div>
</div>

<script src="movimentacoes.js"></script>
</body>
</html>
